title: WASH PRO CRM
tagline: Local CRM/SCADA for self-service car washes
description: Local CRM/SCADA for self-service car washes — real-time monitoring, customer cards, analytics, RBAC, Docker stack with Dynamic API and PyOrchestrator.
url: https://wash-pro.github.io
baseurl: /WASH-PRO-CRM
lang: en
logo: /assets/banner.png

markdown: GFM
permalink: pretty

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-redirect-from

relative_links:
  enabled: true
  collections: true

exclude:
  - Gemfile
  - Gemfile.lock

defaults:
  - scope:
      path: ""
    values:
      image: /assets/banner.png
  - scope:
      path: "en"
      type: "pages"
    values:
      lang: en
  - scope:
      path: "ru"
      type: "pages"
    values:
      lang: ru
  - scope:
      path: "legacy"
      type: "pages"
    values:
      robots: noindex
