<aside class="sidebar">
  <a class="sidebar-brand" href="{{ '/' | relative_url }}">
    <span class="sidebar-logo">DAP</span>
    <span>
      <strong>Dynamic API</strong>
      <small>Platform v1.5.13</small>
    </span>
  </a>

  <nav class="sidebar-nav">
    {% for item in site.nav %}
      {% assign item_url = item.url | relative_url %}
      {% assign page_url = page.url | relative_url %}
      <a href="{{ item_url }}" class="nav-link{% if page_url == item_url %} active{% endif %}">
        {{ item.title }}
      </a>
    {% endfor %}
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-footer-label">Issues</div>
    <div class="sidebar-footer-links">
      <a href="https://github.com/Dynamic-API-Platform/Dynamic-API-Platform/issues/new?template=bug_report.yml" target="_blank" rel="noopener">Report a bug</a>
      <a href="https://github.com/Dynamic-API-Platform/Dynamic-API-Platform/issues/new?template=feature_request.yml" target="_blank" rel="noopener">Feature request</a>
      <a href="https://github.com/Dynamic-API-Platform/Dynamic-API-Platform/issues" target="_blank" rel="noopener">All issues</a>
    </div>
  </div>
</aside>
