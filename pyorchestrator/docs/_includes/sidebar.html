<aside class="sidebar">
  <a class="sidebar-brand" href="{{ '/' | relative_url }}">
    <span class="sidebar-logo">PO</span>
    <span>
      <strong>PyOrchestrator</strong>
      <small>SCADA / CMS</small>
    </span>
  </a>

  <nav class="sidebar-nav">
    {% for item in site.nav %}
      {% assign item_url = item.url | relative_url %}
      {% assign page_url = page.url | relative_url %}
      <a href="{{ item_url }}" class="nav-link{% if page_url == item_url %} active{% endif %}">
        {{ item.title }}
      </a>
    {% endfor %}
  </nav>

  <div class="sidebar-footer sidebar-issues" data-repo="{{ site.github_org }}/{{ site.github_repo }}">
    <div class="sidebar-issues-title">Issues</div>
    <ul class="sidebar-issues-list" aria-live="polite">
      <li class="sidebar-issues-loading">Загрузка…</li>
    </ul>
    <a
      class="sidebar-issues-all"
      href="https://github.com/{{ site.github_org }}/{{ site.github_repo }}/issues"
      target="_blank"
      rel="noopener"
    >Все issues →</a>
  </div>
</aside>
