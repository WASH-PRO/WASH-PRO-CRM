name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync version docs
        run: ./scripts/sync-version-docs.sh

      - name: Validate i18n key parity
        run: chmod +x ./scripts/validate-i18n-keys.sh && ./scripts/validate-i18n-keys.sh

      - name: Validate docs links
        run: chmod +x ./scripts/validate-docs-links.sh && ./scripts/validate-docs-links.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Dashboard typecheck
        working-directory: dashboard
        run: npm ci && npm run build
