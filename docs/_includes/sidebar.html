<aside class="sidebar">
  <a class="sidebar-brand" href="{{ '/' | relative_url }}">
    <span class="sidebar-logo">WASH</span>
    <span>
      <strong>PRO CRM</strong>
      <small>SCADA / CRM</small>
    </span>
  </a>

  <nav class="sidebar-nav">
    {% for item in site.nav %}
      {% assign item_url = item.url | relative_url %}
      {% assign page_url = page.url | relative_url %}
      <a href="{{ item_url }}" class="nav-link{% if page_url == item_url %} active{% endif %}">
        {{ item.title }}
      </a>
    {% endfor %}
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-resources-title">Resources</div>
    <a href="https://wash-pro.github.io/WASH-PRO-CRM/" target="_blank" rel="noopener">Документация</a>
    <a href="https://github.com/WASH-PRO/WASH-PRO-CRM" target="_blank" rel="noopener">GitHub</a>
  </div>
</aside>
