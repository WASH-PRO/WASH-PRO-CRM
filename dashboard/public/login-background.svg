<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="35%" stop-color="#0891b2"/>
      <stop offset="70%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="depth" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#082f49" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#0c4a6e" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow-tl" cx="18%" cy="12%" r="55%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-br" cx="88%" cy="82%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bubble-shine" cx="32%" cy="28%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#e0f2fe" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="mist-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#sky)"/>
  <rect width="1440" height="900" fill="url(#depth)"/>
  <rect width="1440" height="900" fill="url(#glow-tl)"/>
  <rect width="1440" height="900" fill="url(#glow-br)"/>

  <!-- Soft bokeh layer -->
  <g filter="url(#soft-blur)" opacity="0.55">
    <circle cx="180" cy="140" r="90" fill="#a5f3fc" fill-opacity="0.18"/>
    <circle cx="420" cy="260" r="120" fill="#67e8f9" fill-opacity="0.14"/>
    <circle cx="980" cy="180" r="100" fill="#22d3ee" fill-opacity="0.16"/>
    <circle cx="1180" cy="420" r="140" fill="#7dd3fc" fill-opacity="0.12"/>
    <circle cx="320" cy="620" r="110" fill="#38bdf8" fill-opacity="0.1"/>
    <circle cx="760" cy="700" r="130" fill="#06b6d4" fill-opacity="0.14"/>
  </g>

  <!-- Rising bubble field -->
  <g fill="none" stroke="#e0f2fe" stroke-opacity="0.22">
    <circle cx="120" cy="720" r="8"/><circle cx="145" cy="680" r="5"/><circle cx="95" cy="640" r="6"/>
    <circle cx="210" cy="760" r="11"/><circle cx="240" cy="710" r="4"/><circle cx="180" cy="660" r="7"/>
    <circle cx="310" cy="780" r="6"/><circle cx="350" cy="730" r="9"/><circle cx="290" cy="690" r="3"/>
    <circle cx="430" cy="800" r="7"/><circle cx="470" cy="750" r="5"/><circle cx="410" cy="710" r="8"/>
    <circle cx="560" cy="770" r="10"/><circle cx="600" cy="720" r="4"/><circle cx="540" cy="680" r="6"/>
    <circle cx="700" cy="790" r="8"/><circle cx="740" cy="740" r="5"/><circle cx="680" cy="700" r="7"/>
    <circle cx="860" cy="810" r="9"/><circle cx="900" cy="760" r="6"/><circle cx="840" cy="720" r="4"/>
    <circle cx="1020" cy="780" r="7"/><circle cx="1060" cy="730" r="10"/><circle cx="1000" cy="690" r="5"/>
    <circle cx="1180" cy="800" r="6"/><circle cx="1220" cy="750" r="8"/><circle cx="1160" cy="710" r="4"/>
    <circle cx="1320" cy="770" r="9"/><circle cx="1360" cy="720" r="5"/><circle cx="1300" cy="680" r="7"/>
  </g>

