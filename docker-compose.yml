name: wash-pho-crm

services:
  # ===========================================================================
  # База данных Dynamic API (MongoDB) — только внутренняя сеть
  # ===========================================================================
  mongodb:
    image: mongo:7
    container_name: wash-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: dynamic_api
    volumes:
      - mongodb_data:/data/db
    networks:
      - wash-internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Dynamic API Backend — основной API слой
  # ===========================================================================
  dynamic-api:
    build:
      context: ./dynamic-api/backend
      dockerfile: Dockerfile
    container_name: wash-dynamic-api
    restart: unless-stopped
    ports:
      - "${DYNAMIC_API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/dynamic_api
      JWT_SECRET: ${JWT_SECRET:-dap-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dap-super-secret-refresh-key-change-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:3001,http://localhost:8080}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 5000
      CSRF_SECRET: ${CSRF_SECRET:-dap-csrf-secret-change-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@wash-crm.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    networks:
      - wash-internal
      - wash-external
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # Dynamic API Panel — веб-панель управления API (endpoints, users, logs)
  # ===========================================================================
  dynamic-api-panel:
    build:
      context: .
      dockerfile: services/dynamic-api-panel/Dockerfile
      args:
        VITE_API_URL: ""
    container_name: wash-dynamic-api-panel
    restart: unless-stopped
    ports:
      - "${DYNAMIC_API_PANEL_PORT:-8080}:80"
    depends_on:
      dynamic-api:
        condition: service_healthy
    networks:
      - wash-internal
      - wash-external

  # ===========================================================================
  # Инициализация CRM: endpoints, группы RBAC, service account
  # ===========================================================================
  init-seed:
    build:
      context: ./services/init-seed
      dockerfile: Dockerfile
    container_name: wash-init-seed
    restart: on-failure:5
    labels:
      - "wash.role=init"
      - "wash.note=one-shot container, Exited(0) means success"
    environment:
      API_URL: http://dynamic-api:3001
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      SERVICE_LOGIN: ${SERVICE_LOGIN:-service}
      SERVICE_PASSWORD: ${SERVICE_PASSWORD:-ServiceInternal123!}
    depends_on:
      dynamic-api:
        condition: service_healthy
    networks:
      - wash-internal

  # ===========================================================================
  # RabbitMQ — приём сообщений от контроллеров
  # ===========================================================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: wash-rabbitmq
    hostname: wash-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-wash}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-wash_secret_change_me}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./config/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - wash-internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  rabbitmq-init:
    image: rabbitmq:3.13-management-alpine
    container_name: wash-rabbitmq-init
    restart: "no"
    entrypoint: ["/bin/sh", "/init-user.sh"]
    environment:
      RABBITMQ_USER: ${RABBITMQ_USER:-wash}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-wash_secret_change_me}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq/init-user.sh:/init-user.sh:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    network_mode: "service:rabbitmq"

  # ===========================================================================
  # Message Processor — RabbitMQ → Dynamic API
  # ===========================================================================
  message-processor:
    build:
      context: ./services/message-processor
      dockerfile: Dockerfile
    container_name: wash-message-processor
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-wash}:${RABBITMQ_PASSWORD:-wash_secret_change_me}@rabbitmq:5672
      RABBITMQ_QUEUE: wash.telemetry
      API_URL: http://dynamic-api:3001
      SERVICE_LOGIN: ${SERVICE_LOGIN:-service}
      SERVICE_PASSWORD: ${SERVICE_PASSWORD:-ServiceInternal123!}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
      dynamic-api:
        condition: service_healthy
      init-seed:
        condition: service_completed_successfully
    networks:
      - wash-internal

  # ===========================================================================
  # Redis — опциональный кеш (profile: redis)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: wash-redis
    restart: unless-stopped
    profiles:
      - redis
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$$REDIS_PASSWORD";
      else
        redis-server;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - wash-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # Backup Service — резервное копирование MongoDB
  # ===========================================================================
  backup:
    build:
      context: ./services/backup
      dockerfile: Dockerfile
    container_name: wash-backup
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017/dynamic_api
      API_URL: http://dynamic-api:3001
      SERVICE_LOGIN: ${SERVICE_LOGIN:-service}
      SERVICE_PASSWORD: ${SERVICE_PASSWORD:-ServiceInternal123!}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-7}
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
    volumes:
      - backup_data:/backups
    depends_on:
      mongodb:
        condition: service_healthy
      dynamic-api:
        condition: service_healthy
      init-seed:
        condition: service_completed_successfully
    networks:
      - wash-internal

  # ===========================================================================
  # Telegram Bot Service
  # ===========================================================================
  telegram-bot:
    build:
      context: ./services/telegram-bot
      dockerfile: Dockerfile
    container_name: wash-telegram-bot
    restart: unless-stopped
    environment:
      API_URL: http://dynamic-api:3001
      SERVICE_LOGIN: ${SERVICE_LOGIN:-service}
      SERVICE_PASSWORD: ${SERVICE_PASSWORD:-ServiceInternal123!}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
      POLL_INTERVAL_MS: 5000
    depends_on:
      dynamic-api:
        condition: service_healthy
      init-seed:
        condition: service_completed_successfully
    networks:
      - wash-internal

  # ===========================================================================
  # Dashboard — единственный сервис, доступный снаружи
  # ===========================================================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        VITE_APP_VERSION: ${APP_VERSION:-1.0.0}
    container_name: wash-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-80}:80"
    depends_on:
      dynamic-api:
        condition: service_healthy
      init-seed:
        condition: service_completed_successfully
    networks:
      - wash-internal
      - wash-external

networks:
  wash-internal:
    driver: bridge
    internal: true
  wash-external:
    driver: bridge

volumes:
  mongodb_data:
    name: wash_mongodb_data
  backend_logs:
    name: wash_backend_logs
  rabbitmq_data:
    name: wash_rabbitmq_data
  redis_data:
    name: wash_redis_data
  backup_data:
    name: wash_backup_data
