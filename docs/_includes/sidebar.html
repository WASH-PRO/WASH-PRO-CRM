<aside class="sidebar">
  <a class="sidebar-brand" href="{{ '/' | relative_url }}">
    <span class="sidebar-logo">WASH</span>
    <span>
      <strong>PHO CRM</strong>
      <small>SCADA / CRM</small>
    </span>
  </a>

  <nav class="sidebar-nav">
    {% for item in site.nav %}
      {% assign item_url = item.url | relative_url %}
      {% assign page_url = page.url | relative_url %}
      <a href="{{ item_url }}" class="nav-link{% if page_url == item_url %} active{% endif %}">
        {{ item.title }}
      </a>
    {% endfor %}
  </nav>

  <div class="sidebar-footer">
  {% if site.github.repository_url %}
    <a href="{{ site.github.repository_url }}" target="_blank" rel="noopener">GitHub</a>
    <span>·</span>
    <a href="{{ site.github.repository_url }}/issues" target="_blank" rel="noopener">Issues</a>
  {% else %}
    <a href="https://github.com/Developer-RU/WASH-PHO-CRM" target="_blank" rel="noopener">GitHub</a>
    <span>·</span>
    <a href="https://github.com/Developer-RU/WASH-PHO-CRM/issues" target="_blank" rel="noopener">Issues</a>
  {% endif %}
  </div>
</aside>
