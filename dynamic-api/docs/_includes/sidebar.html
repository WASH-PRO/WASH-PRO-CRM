<aside class="sidebar">
  <a class="sidebar-brand" href="{{ '/' | relative_url }}">
    <span class="sidebar-logo">DAP</span>
    <span>
      <strong>Dynamic API</strong>
      <small>Platform v1.0</small>
    </span>
  </a>

  <nav class="sidebar-nav">
    {% for item in site.nav %}
      {% assign item_url = item.url | relative_url %}
      {% assign page_url = page.url | relative_url %}
      <a href="{{ item_url }}" class="nav-link{% if page_url == item_url %} active{% endif %}">
        {{ item.title }}
      </a>
    {% endfor %}
  </nav>

  <div class="sidebar-footer">
    <a href="https://github.com/Dynamic-API-Platform/Dynamic-API-Platform" target="_blank" rel="noopener">GitHub</a>
    <span>·</span>
    <a href="https://github.com/Dynamic-API-Platform/Dynamic-API-Platform/issues" target="_blank" rel="noopener">Issues</a>
  </div>
</aside>
