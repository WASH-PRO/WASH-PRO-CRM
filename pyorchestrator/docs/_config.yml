  - title: Панель управления
    url: /control-plane/
  - title: Runtime и sandbox
    url: /runtime/
  - title: MCP для AI-агентов
    url: /mcp/
  - title: Схема данных
    url: /database-schema/
  - title: Справочник API
    url: /api-reference/
  - title: Развёртывание
    url: /deployment/
  - title: Конфигурация
    url: /configuration/
  - title: Безопасность
    url: /security/
  - title: Дорожная карта
    url: /roadmap/
  - title: Устранение неполадок
