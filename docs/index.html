<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WASH PRO CRM — Documentation</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    (function () {
      var supported = ['ru', 'en', 'kk'];
      var saved = localStorage.getItem('wash-docs-lang');
      var browser = (navigator.language || 'ru').slice(0, 2).toLowerCase();
      var lang = supported.indexOf(saved) >= 0 ? saved : (supported.indexOf(browser) >= 0 ? browser : 'ru');
      var base = '{{ "/" | relative_url }}';
      window.location.replace(base + lang + '/');
    })();
  </script>
  <meta http-equiv="refresh" content="0;url={{ '/ru/' | relative_url }}">
</head>
<body>
  <main class="lang-picker">
    <h1>WASH PRO CRM</h1>
    <p>Выберите язык / Choose language / Тілді таңдаңыз</p>
    <div class="lang-picker-links">
      <a href="{{ '/ru/' | relative_url }}">Русский</a>
      <a href="{{ '/en/' | relative_url }}">English</a>
      <a href="{{ '/kk/' | relative_url }}">Қазақша</a>
    </div>
  </main>
</body>
</html>
