title: WASH PRO CRM
description: Local CRM/SCADA for self-service car washes on Dynamic API Platform
url: https://wash-pro.github.io
baseurl: /WASH-PRO-CRM

markdown: GFM
permalink: pretty
lang: ru

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-redirect-from

relative_links:
  enabled: true
  collections: true

exclude:
  - Gemfile
  - Gemfile.lock

defaults:
  - scope:
      path: "ru"
      type: "pages"
    values:
      lang: ru
  - scope:
      path: "en"
      type: "pages"
    values:
      lang: en
  - scope:
      path: "kk"
      type: "pages"
    values:
      lang: kk
