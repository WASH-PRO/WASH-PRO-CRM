<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    (function () {
      var base = '/WASH-PRO-CRM';
      var path = window.location.pathname;

      if (path.indexOf(base) !== 0) {
        window.location.replace(base + '/en/');
        return;
      }

      if (/\.html$/i.test(path)) {
        path = path.replace(/\.html$/i, '/');
      } else if (path !== base + '/' && path.indexOf(base + '/') === 0 && !/\/$/.test(path)) {
        path = path + '/';
      }

      if (path !== window.location.pathname) {
        window.location.replace(path + window.location.search + window.location.hash);
        return;
      }

      window.location.replace(base + '/en/');
    })();
  </script>
  <meta http-equiv="refresh" content="0;url=/WASH-PRO-CRM/en/">
</head>
<body>
  <p>Redirecting to <a href="/WASH-PRO-CRM/en/">documentation</a>…</p>
</body>
</html>
