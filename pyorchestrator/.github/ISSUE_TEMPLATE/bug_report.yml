name: Bug report
description: Сообщить об ошибке
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо за отчёт. Проверьте [Troubleshooting](https://pyorchestrator.github.io/PyOrchestrator/troubleshooting/) перед отправкой.
  - type: textarea
    id: description
    attributes:
      label: Описание
      description: Что произошло?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      placeholder: |
        1. docker compose up
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Версия
      placeholder: "0.1.0 или commit hash"
  - type: textarea
    id: logs
    attributes:
      label: Логи
      description: docker compose ps, docker compose logs ...
      render: shell
