permalink: /
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WASH PRO CRM — Documentation</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    (function () {
      var supported = ['en', 'ru'];
      var saved = localStorage.getItem('wash-docs-lang');
      var browser = (navigator.language || 'en').slice(0, 2).toLowerCase();
      var lang = supported.indexOf(saved) >= 0 ? saved : (browser === 'ru' ? 'ru' : 'en');
      var base = '{{ "/" | relative_url }}';
      window.location.replace(base + lang + '/');
    })();
  </script>
</head>
<body>
  <main class="lang-picker">
    <h1>WASH PRO CRM</h1>
    <p>Choose language / Выберите язык</p>
    <div class="lang-picker-links">
      <a href="{{ '/en/' | relative_url }}" onclick="try{localStorage.setItem('wash-docs-lang','en')}catch(e){}">English</a>
      <a href="{{ '/ru/' | relative_url }}" onclick="try{localStorage.setItem('wash-docs-lang','ru')}catch(e){}">Русский</a>
    </div>
  </main>
</body>
</html>
