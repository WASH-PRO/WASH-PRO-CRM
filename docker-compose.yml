# WASH_HOST_PROJECT_ROOT — реальный путь на хосте для bind mount (автообновление из контейнера).
# WASH_BUILD_ROOT — путь для docker build context (в update-bridge = /deploy).
name: wash-pro-crm

services:
  # ===========================================================================
  # База данных Dynamic API (MongoDB) — только внутренняя сеть
  # ===========================================================================
  mongodb:
    image: mongo:7
    container_name: wash-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: dynamic_api
    volumes:
      - ${DATA_DIR:-./data}/mongodb:/data/db
    networks:
      - wash-internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Dynamic API Backend — основной API слой
  # ===========================================================================
  dynamic-api:
    build:
      context: ${WASH_BUILD_ROOT:-${WASH_HOST_PROJECT_ROOT:-.}}/dynamic-api
      dockerfile: backend/Dockerfile
    container_name: wash-dynamic-api
    restart: unless-stopped
    ports:
      - "${DYNAMIC_API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/dynamic_api
      JWT_SECRET: ${JWT_SECRET:-dap-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dap-super-secret-refresh-key-change-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:3001,http://localhost:8080}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 5000
      CSRF_SECRET: ${CSRF_SECRET:-dap-csrf-secret-change-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@wash-pro-crm.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      # Версия берётся из dynamic-api/backend/package.json (не задавайте DYNAMIC_API_VERSION без нужды)
      APP_VERSION: ${DYNAMIC_API_VERSION:-}
      UPDATE_EXECUTOR_ENABLED: ${UPDATE_EXECUTOR_ENABLED:-false}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ${DATA_DIR:-./data}/dynamic-api/logs:/app/logs
    networks:
      - wash-internal
      - wash-external
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===========================================================================
  # Dynamic API Panel — веб-панель управления API (endpoints, users, logs)
  # ===========================================================================
  dynamic-api-panel:
    build:
      context: ${WASH_BUILD_ROOT:-${WASH_HOST_PROJECT_ROOT:-.}}
      dockerfile: services/dynamic-api-panel/Dockerfile
      args:
        VITE_API_URL: ""
    container_name: wash-dynamic-api-panel
    restart: unless-stopped
    ports:
      - "${DYNAMIC_API_PANEL_PORT:-8080}:80"
    depends_on:
      dynamic-api:
        condition: service_healthy
    networks:
      - wash-internal
      - wash-external

  # ===========================================================================
  # Инициализация CRM: endpoints, группы RBAC, service account
  # ===========================================================================
  init-seed:
    build:
      context: ${WASH_BUILD_ROOT:-${WASH_HOST_PROJECT_ROOT:-.}}/services/init-seed
      dockerfile: Dockerfile
    container_name: wash-init-seed
    restart: on-failure:5
    labels:
      - "wash.role=init"
      - "wash.note=one-shot container, Exited(0) means success"
    environment:
      API_URL: http://dynamic-api:3001
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      SERVICE_LOGIN: ${SERVICE_LOGIN:-service}
      SERVICE_PASSWORD: ${SERVICE_PASSWORD:-ServiceInternal123!}
    depends_on:
      dynamic-api:
        condition: service_healthy
    networks:
      - wash-internal

  # ===========================================================================
  # Mosquitto — приём телеметрии от контроллеров (MQTT)
  # ===========================================================================
  mosquitto-init:
    image: eclipse-mosquitto:2
    container_name: wash-mosquitto-init
    restart: "no"
    entrypoint: ["/bin/sh", "/init-user.sh"]
    environment:
      MQTT_USER: ${MQTT_USER:-system}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?Set MQTT_PASSWORD in .env}
    volumes:
      - ${DATA_DIR:-./data}/mosquitto/config:/mosquitto/config
      - ${WASH_HOST_PROJECT_ROOT:-.}/config/mosquitto/mosquitto.conf:/mosquitto-conf/mosquitto.conf:ro
      - ${WASH_HOST_PROJECT_ROOT:-.}/config/mosquitto/acl:/mosquitto-conf/acl:ro
      - ${WASH_HOST_PROJECT_ROOT:-.}/config/mosquitto/init-user.sh:/init-user.sh:ro
    networks:
      - wash-internal

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: wash-mosquitto
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/watch-entrypoint.sh"]
    ports:
      - "${MQTT_PORT_PUBLISH:-1883:1883}"
    volumes:
      - ${DATA_DIR:-./data}/mosquitto/data:/mosquitto/data
      - ${DATA_DIR:-./data}/mosquitto/config:/mosquitto/config
      - ${WASH_HOST_PROJECT_ROOT:-.}/config/mosquitto/watch-entrypoint.sh:/watch-entrypoint.sh:ro
    depends_on:
      mosquitto-init:
        condition: service_completed_successfully
    networks:
      - wash-internal
      - wash-external
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h 127.0.0.1 -p 1884 -t '$$SYS/broker/version' -C 1 -W 3"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ===========================================================================
  # Message Processor — MQTT → Dynamic API
  # ===========================================================================
  message-processor:
    build:
      context: ${WASH_BUILD_ROOT:-${WASH_HOST_PROJECT_ROOT:-.}}/services/message-processor
      dockerfile: Dockerfile
    container_name: wash-message-processor
    restart: unless-stopped
    environment:
      MQTT_URL: mqtt://${MQTT_USER:-system}:${MQTT_PASSWORD:?Set MQTT_PASSWORD in .env}@mosquitto:1883
      MQTT_USER: ${MQTT_USER:-system}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?Set MQTT_PASSWORD in .env}
      MQTT_TOPIC: wash/telemetry/#
      MQTT_DEVICE_TOPIC: +/+/# 
      MQTT_DLQ_TOPIC: wash/dlq
      API_URL: http://dynamic-api:3001
      PROCESSOR_HTTP_PORT: 3022
      MQTT_DEVICE_PREFIX: ${MQTT_DEVICE_PREFIX:-washpro}
      MQTT_PASSWD_FILE: /mosquitto-config/passwd
      MQTT_ACL_FILE: /mosquitto-config/acl
      SERVICE_LOGIN: ${SERVICE_LOGIN:-service}
      SERVICE_PASSWORD: ${SERVICE_PASSWORD:-ServiceInternal123!}
      MQTT_SYNC_INTERNAL_TOKEN: ${MQTT_SYNC_INTERNAL_TOKEN:-${SERVICE_PASSWORD:-ServiceInternal123!}}
      REDIS_ENABLED: ${REDIS_ENABLED:-false}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    depends_on:
      mosquitto:
        condition: service_healthy
      dynamic-api:
        condition: service_healthy
      init-seed:
        condition: service_completed_successfully
    networks:
      - wash-internal
    volumes:
      - ${DATA_DIR:-./data}/mosquitto/config:/mosquitto-config

  # ===========================================================================
  # Redis — опциональный кеш (profile: redis)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: wash-redis
    restart: unless-stopped
    profiles:
      - redis
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$$REDIS_PASSWORD";
      else
        redis-server;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    networks:
      - wash-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ===========================================================================
  # Backup Service — резервное копирование MongoDB
  # ===========================================================================
  backup:
    build:
      context: ${WASH_BUILD_ROOT:-${WASH_HOST_PROJECT_ROOT:-.}}/services/backup
      dockerfile: Dockerfile
    container_name: wash-backup
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017/dynamic_api
      API_URL: http://dynamic-api:3001
      SERVICE_LOGIN: ${SERVICE_LOGIN:-service}
      SERVICE_PASSWORD: ${SERVICE_PASSWORD:-ServiceInternal123!}
      BACKUP_DIR: /backups
      BACKUP_HTTP_PORT: "3020"
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-7}
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
    volumes:
      - ${DATA_DIR:-./data}/backups:/backups
    depends_on:
      mongodb:
        condition: service_healthy
      dynamic-api:
        condition: service_healthy
      init-seed:
        condition: service_completed_successfully
    networks:
      - wash-internal

  # ===========================================================================
  # Update Bridge — проверка GitHub и оркестрация обновлений WASH / DAP / PyOrch
  # ===========================================================================
  update-bridge:
    build:
      context: ${WASH_BUILD_ROOT:-${WASH_HOST_PROJECT_ROOT:-.}}/services/update-bridge
      dockerfile: Dockerfile
    container_name: wash-update-bridge
    restart: unless-stopped
    environment:
      API_URL: http://dynamic-api:3001
      UPDATE_HTTP_PORT: 3023
      DEPLOY_ROOT: /deploy
      STATE_DIR: /data
      APP_VERSION: ${APP_VERSION:-1.1.34}
      UPDATE_EXECUTOR_ENABLED: ${UPDATE_EXECUTOR_ENABLED:-true}
      HOST_PROJECT_ROOT: ${WASH_HOST_PROJECT_ROOT:-${PWD}}
      DATA_DIR: ${DATA_DIR:-./data}
      CRM_GITHUB_REPO: ${CRM_GITHUB_REPO:-WASH-PRO/WASH-PRO-CRM}
      DYNAMIC_API_GITHUB_REPO: ${DYNAMIC_API_GITHUB_REPO:-Dynamic-API-Platform/Dynamic-API-Platform}
      PYORCHESTRATOR_GITHUB_REPO: ${PYORCHESTRATOR_GITHUB_REPO:-PyOrchestrator/PyOrchestrator}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SERVICE_LOGIN: ${SERVICE_LOGIN:-service}
      SERVICE_PASSWORD: ${SERVICE_PASSWORD:-ServiceInternal123!}
    volumes:
      - ${WASH_HOST_PROJECT_ROOT:-.}:/deploy
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_DIR:-./data}/update-bridge:/data
    depends_on:
      dynamic-api:
        condition: service_healthy
    networks:
      - wash-internal
      - wash-external

  # ===========================================================================
  # Modules Bridge — каталог и жизненный цикл модулей WASH
  # ===========================================================================
  modules-bridge:
    build:
      context: ${WASH_BUILD_ROOT:-${WASH_HOST_PROJECT_ROOT:-.}}/services/modules-bridge
      dockerfile: Dockerfile
    container_name: wash-modules-bridge
    restart: unless-stopped
    environment:
      MODULES_HTTP_PORT: 3024
      MODULES_DIR: /modules
      DEPLOY_ROOT: /deploy
      CRM_API_URL: http://dynamic-api:3001
      CRM_API_BASE_URL: http://dynamic-api:3001
      PYORCH_API_URL: http://pyorch-backend:8000
      PYORCH_EMAIL: ${PYORCH_DASHBOARD_EMAIL:-admin@pyorchestrator.local}
      PYORCH_PASSWORD: ${PYORCH_DASHBOARD_PASSWORD:-admin}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SERVICE_LOGIN: ${SERVICE_LOGIN:-service}
      SERVICE_PASSWORD: ${SERVICE_PASSWORD:-ServiceInternal123!}
    volumes:
      - ${WASH_HOST_PROJECT_ROOT:-.}/modules:/modules
      - ${WASH_HOST_PROJECT_ROOT:-.}:/deploy:ro
    depends_on:
      dynamic-api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3024:3024"
    networks:
      - wash-internal
      - wash-external

  # ===========================================================================
  # Dashboard — единственный сервис, доступный снаружи
  # ===========================================================================
  dashboard:
    build:
      context: ${WASH_BUILD_ROOT:-${WASH_HOST_PROJECT_ROOT:-.}}/dashboard
      dockerfile: Dockerfile
      args:
        VITE_APP_VERSION: ${APP_VERSION:-1.1.34}
    container_name: wash-dashboard
    restart: unless-stopped
    environment:
      PYORCHESTRATOR_ENABLED: ${PYORCHESTRATOR_ENABLED:-false}
      APP_VERSION: ${APP_VERSION:-1.1.34}
    ports:
      - "${DASHBOARD_PORT:-80}:80"
    depends_on:
      dynamic-api:
        condition: service_healthy
      init-seed:
        condition: service_completed_successfully
    networks:
      - wash-internal
      - wash-external

networks:
  wash-internal:
    driver: bridge
    internal: true
  wash-external:
    driver: bridge
