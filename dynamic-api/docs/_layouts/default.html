<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>
  <div class="site">
    {% include mobile-header.html %}
    {% include sidebar.html %}
    <div class="main">
      <main class="content">
        {% if page.title and page.title != site.title %}
          <header class="page-header">
            <h1>{{ page.title }}</h1>
            {% if page.description %}
              <p class="page-lead">{{ page.description }}</p>
            {% endif %}
          </header>
        {% endif %}
        {{ content }}
      </main>
      {% include footer.html %}
    </div>
  </div>
  <script src="{{ '/assets/js/site.js' | relative_url }}" defer></script>
</body>
</html>
