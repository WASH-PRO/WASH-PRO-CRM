    <circle cx="260" cy="480" r="28" fill="#0ea5e9" fill-opacity="0.12" stroke="#e0f2fe" stroke-opacity="0.35" stroke-width="1.2"/>
    <circle cx="252" cy="472" r="9" fill="url(#bubble-shine)"/>
    <circle cx="520" cy="390" r="36" fill="#0284c7" fill-opacity="0.1" stroke="#bae6fd" stroke-opacity="0.3" stroke-width="1.2"/>
    <circle cx="508" cy="378" r="11" fill="url(#bubble-shine)"/>
    <circle cx="780" cy="520" r="22" fill="#0ea5e9" fill-opacity="0.11" stroke="#e0f2fe" stroke-opacity="0.32" stroke-width="1"/>
    <circle cx="773" cy="513" r="7" fill="url(#bubble-shine)"/>
    <circle cx="1040" cy="430" r="42" fill="#0369a1" fill-opacity="0.12" stroke="#bae6fd" stroke-opacity="0.28" stroke-width="1.2"/>
    <circle cx="1028" cy="416" r="13" fill="url(#bubble-shine)"/>
    <circle cx="1280" cy="560" r="18" fill="#0ea5e9" fill-opacity="0.1" stroke="#e0f2fe" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="1274" cy="554" r="6" fill="url(#bubble-shine)"/>
    <circle cx="160" cy="340" r="20" fill="#0284c7" fill-opacity="0.09" stroke="#bae6fd" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="154" cy="334" r="6" fill="url(#bubble-shine)"/>
    <circle cx="640" cy="280" r="24" fill="#0ea5e9" fill-opacity="0.1" stroke="#e0f2fe" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="632" cy="272" r="8" fill="url(#bubble-shine)"/>
    <circle cx="920" cy="300" r="16" fill="#0284c7" fill-opacity="0.09" stroke="#bae6fd" stroke-opacity="0.28" stroke-width="1"/>
    <circle cx="914" cy="294" r="5" fill="url(#bubble-shine)"/>
  </g>

  <!-- Water splash arcs -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M340 620 C360 560 400 520 460 500 C420 540 410 590 430 640 Z" fill="#e0f2fe" fill-opacity="0.08" stroke="#bae6fd" stroke-opacity="0.35" stroke-width="1.5"/>
    <path d="M340 620 C380 580 430 565 490 570 C440 600 400 630 360 655 Z" fill="#67e8f9" fill-opacity="0.06" stroke="#7dd3fc" stroke-opacity="0.28" stroke-width="1.2"/>
    <path d="M880 650 C910 590 970 560 1040 555 C990 600 960 640 920 675 Z" fill="#e0f2fe" fill-opacity="0.07" stroke="#bae6fd" stroke-opacity="0.32" stroke-width="1.5"/>
    <path d="M880 650 C930 610 990 600 1060 615 C1010 645 960 675 910 695 Z" fill="#67e8f9" fill-opacity="0.05" stroke="#7dd3fc" stroke-opacity="0.25" stroke-width="1.2"/>
    <path d="M1120 360 C1145 310 1190 280 1250 270 C1205 305 1185 345 1165 385 Z" fill="#e0f2fe" fill-opacity="0.06" stroke="#bae6fd" stroke-opacity="0.3" stroke-width="1.2"/>
  </g>

  <!-- Spray droplets / splash trails -->
  <g fill="#e0f2fe" opacity="0.45">
    <circle cx="470" cy="490" r="2.2"/><circle cx="488" cy="478" r="1.6"/><circle cx="505" cy="468" r="2"/>
    <circle cx="522" cy="458" r="1.4"/><circle cx="538" cy="452" r="1.8"/><circle cx="455" cy="505" r="1.5"/>
    <circle cx="1055" cy="545" r="2"/><circle cx="1072" cy="532" r="1.5"/><circle cx="1088" cy="522" r="1.8"/>
    <circle cx="1104" cy="515" r="1.3"/><circle cx="1120" cy="510" r="1.6"/><circle cx="1040" cy="558" r="1.4"/>
    <circle cx="1245" cy="285" r="1.8"/><circle cx="1260" cy="275" r="1.3"/><circle cx="1275" cy="268" r="1.6"/>
    <circle cx="1290" cy="262" r="1.2"/><circle cx="1230" cy="295" r="1.5"/>
  </g>

  <!-- Curved splash ribbons -->
  <g fill="none" stroke="#e0f2fe" stroke-opacity="0.2" stroke-width="2">
    <path d="M200 760 Q280 680 360 720 T520 700"/>
    <path d="M620 820 Q720 740 820 780 T1020 760"/>
    <path d="M1080 820 Q1180 720 1280 760"/>
    <path d="M80 520 Q180 440 300 480"/>
    <path d="M1140 520 Q1220 450 1340 490"/>
  </g>
  <g fill="none" stroke="#67e8f9" stroke-opacity="0.35" stroke-width="1.2">
    <path d="M240 740 Q310 670 390 700"/>
    <path d="M900 790 Q980 710 1060 745"/>
    <path d="M1180 300 Q1240 240 1310 260"/>
  </g>

  <!-- Fine foam mist -->
  <g filter="url(#mist-blur)" fill="#ffffff" opacity="0.18">
    <circle cx="400" cy="540" r="3"/><circle cx="415" cy="530" r="2"/><circle cx="430" cy="525" r="2.5"/>
    <circle cx="445" cy="520" r="1.8"/><circle cx="460" cy="518" r="2"/><circle cx="475" cy="516" r="1.5"/>
    <circle cx="960" cy="570" r="2.2"/><circle cx="975" cy="562" r="1.8"/><circle cx="990" cy="556" r="2"/>
    <circle cx="1005" cy="552" r="1.5"/><circle cx="1020" cy="548" r="1.8"/>
    <circle cx="1220" cy="310" r="2"/><circle cx="1235" cy="302" r="1.6"/><circle cx="1250" cy="296" r="1.8"/>
  </g>

  <!-- Large foreground splash crown -->
  <g opacity="0.75">
    <path d="M560 640 C580 580 640 540 710 530 C660 570 645 610 635 655 C615 630 590 640 560 640 Z" fill="#f0f9ff" fill-opacity="0.07" stroke="#e0f2fe" stroke-opacity="0.25" stroke-width="1"/>
    <path d="M710 530 C760 520 820 535 860 570 C820 545 770 535 710 530 Z" fill="#bae6fd" fill-opacity="0.08"/>
    <g fill="#f0f9ff" opacity="0.35">
      <circle cx="720" cy="520" r="2.5"/><circle cx="738" cy="512" r="2"/><circle cx="756" cy="506" r="1.8"/>
      <circle cx="774" cy="502" r="1.5"/><circle cx="792" cy="500" r="2"/><circle cx="810" cy="502" r="1.6"/>
      <circle cx="828" cy="508" r="1.8"/><circle cx="846" cy="518" r="2"/>
    </g>
  </g>

  <!-- Tiny bubble scatter -->
  <g fill="#f0f9ff" opacity="0.25">
    <circle cx="90" cy="220" r="2"/><circle cx="130" cy="180" r="1.5"/><circle cx="170" cy="210" r="1.8"/>
    <circle cx="550" cy="150" r="2"/><circle cx="590" cy="130" r="1.4"/><circle cx="630" cy="160" r="1.7"/>
    <circle cx="850" cy="190" r="1.8"/><circle cx="890" cy="170" r="1.3"/><circle cx="930" cy="200" r="2"/>
    <circle cx="1200" cy="140" r="1.6"/><circle cx="1240" cy="120" r="2"/><circle cx="1280" cy="150" r="1.5"/>
    <circle cx="200" cy="580" r="1.5"/><circle cx="380" cy="350" r="1.8"/><circle cx="720" cy="420" r="1.4"/>
    <circle cx="1100" cy="650" r="1.6"/><circle cx="1350" cy="400" r="1.8"/><circle cx="60" cy="480" r="1.3"/>
  </g>
</svg>
